<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Messenger Clone</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      display: flex;
      height: 100vh;
    }

    #sidebar {
      width: 250px;
      border-right: 1px solid #ccc;
      padding: 10px;
      background: #f5f5f5;
    }

    #chat {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
    }

    #form {
      display: flex;
      border-top: 1px solid #ccc;
    }

    #input {
      flex: 1;
      padding: 10px;
      border: none;
    }

    button {
      padding: 10px;
      cursor: pointer;
    }

    .user {
      padding: 5px;
      cursor: pointer;
    }

    .user:hover {
      background: #ddd;
    }
  </style>
</head>
<body>

<div id="sidebar">
  <button onclick="login()">Login with Google</button>
  <h3>Users</h3>
  <div id="users"></div>
</div>

<div id="chat">
  <div id="messages"></div>
  <form id="form">
    <input id="input" placeholder="Message..." autocomplete="off"/>
  </form>
</div>

<!-- ✅ Firebase (COMPAT VERSION — IMPORTANT) -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>
/* 🔥 PASTE YOUR FIREBASE CONFIG HERE */
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  projectId: "YOUR_PROJECT_ID"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

let currentUser = null;
let currentChatId = null;

/* LOGIN */
function login() {
  const provider = new firebase.auth.GoogleAuthProvider();
  auth.signInWithPopup(provider);
}

/* AUTH STATE */
auth.onAuthStateChanged(async (user) => {
  if (user) {
    currentUser = user;

    await db.collection("users").doc(user.uid).set({
      name: user.displayName,
      email: user.email
    }, { merge: true });

    loadUsers();
  }
});

/* LOAD USERS */
function loadUsers() {
  db.collection("users").onSnapshot(snapshot => {
    const usersDiv = document.getElementById("users");
    usersDiv.innerHTML = "";

    snapshot.forEach(doc => {
      if (doc.id === currentUser.uid) return;

      const user = doc.data();

      const div = document.createElement("div");
      div.textContent = user.name;
      div.className = "user";
      div.onclick = () => openChat(doc.id);

      usersDiv.appendChild(div);
    });
  });
}

/* OPEN CHAT */
function openChat(otherUserId) {
  currentChatId = [currentUser.uid, otherUserId].sort().join("_");

  db.collection("messages")
    .where("chatId", "==", currentChatId)
    .orderBy("timestamp")
    .onSnapshot(snapshot => {
      const messagesDiv = document.getElementById("messages");
      messagesDiv.innerHTML = "";

      snapshot.forEach(doc => {
        const msg = doc.data();

        const div = document.createElement("div");
        div.textContent =
          msg.text + (msg.read ? " ✔✔" : " ✔");

        messagesDiv.appendChild(div);

        /* MARK AS READ */
        if (msg.to === currentUser.uid && !msg.read) {
          doc.ref.update({ read: true });
        }
      });

      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    });
}

/* SEND MESSAGE */
document.getElementById("form").addEventListener("submit", async (e) => {
  e.preventDefault();

  const input = document.getElementById("input");
  if (!input.value || !currentChatId) return;

  const otherUserId = currentChatId
    .replace(currentUser.uid, "")
    .replace("_", "");

  await db.collection("messages").add({
    chatId: currentChatId,
    from: currentUser.uid,
    to: otherUserId,
    text: input.value,
    timestamp: Date.now(),
    read: false
  });

  input.value = "";
});
</script>

</body>
</html>
