<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Messenger Clone Full Upgrade</title>

  <style>
    body { margin:0; font-family:Arial; display:flex; height:100vh; }
    #sidebar { width:250px; border-right:1px solid #ccc; padding:10px; background:#f5f5f5; }
    #chat { flex:1; display:flex; flex-direction:column; }
    #messages { flex:1; overflow-y:auto; padding:10px; background:#fff; }
    #form { display:flex; border-top:1px solid #ccc; }
    #input { flex:1; padding:10px; border:none; }
    button { padding:8px; margin-top:5px; cursor:pointer; }
    input { width:100%; padding:8px; margin-top:5px; }
    .user { padding:5px; cursor:pointer; display:flex; align-items:center; }
    .user:hover { background:#ddd; }
    .avatar { width:30px; height:30px; border-radius:50%; margin-right:10px; background:#aaa; text-align:center; color:#fff; line-height:30px; }
    .typing { font-style: italic; color: gray; }
    .message { margin-bottom:5px; }
  </style>
</head>
<body>

<div id="sidebar">
  <h3>Sign Up / Login</h3>
  <input id="username" placeholder="Username" />
  <input id="email" placeholder="Email" />
  <input id="password" type="password" placeholder="Password" />
  <button onclick="signup()">Sign Up</button>
  <button onclick="login()">Login</button>

  <h3>Users</h3>
  <div id="users"></div>
</div>

<div id="chat">
  <div id="messages"></div>
  <div id="typing"></div>
  <form id="form">
    <input id="input" placeholder="Message..." autocomplete="off"/>
  </form>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  projectId: "YOUR_PROJECT_ID"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

let currentUser = null;
let currentChatId = null;
let typingTimeout;

/* SIGNUP */
function signup() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;
  const username = document.getElementById("username").value;

  if(!username) { alert('Enter username'); return; }

  auth.createUserWithEmailAndPassword(email, password)
    .then(cred => {
      return db.collection('users').doc(cred.user.uid).set({
        email: email,
        username: username
      });
    })
    .catch(err => alert(err.message));
}

/* LOGIN */
function login() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  auth.signInWithEmailAndPassword(email, password)
    .catch(err => alert(err.message));
}

/* AUTH STATE */
auth.onAuthStateChanged(async (user) => {
  if(user) {
    currentUser = user;
    const userDoc = await db.collection('users').doc(user.uid).get();
    currentUser.username = userDoc.data().username;
    loadUsers();
  }
});

/* LOAD USERS */
function loadUsers() {
  db.collection('users').onSnapshot(snapshot => {
    const usersDiv = document.getElementById('users');
    usersDiv.innerHTML = '';

    snapshot.forEach(doc => {
      if(doc.id === currentUser.uid) return;
      const user = doc.data();
      const div = document.createElement('div');
      div.className = 'user';
      div.onclick = () => openChat(doc.id);

      const avatar = document.createElement('div');
      avatar.className = 'avatar';
      avatar.textContent = user.username[0].toUpperCase();

      div.appendChild(avatar);
      div.appendChild(document.createTextNode(user.username));
      usersDiv.appendChild(div);
    });
  });
}

/* OPEN CHAT */
function openChat(otherUserId) {
  currentChatId = [currentUser.uid, otherUserId].sort().join('_');

  const messagesDiv = document.getElementById('messages');
  messagesDiv.innerHTML = '';

  const typingDiv = document.getElementById('typing');

  db.collection('messages')
    .where('chatId', '==', currentChatId)
    .orderBy('timestamp')
    .onSnapshot(snapshot => {
      messagesDiv.innerHTML = '';
      snapshot.forEach(doc => {
        const msg = doc.data();
        const div = document.createElement('div');
        div.className = 'message';
        div.textContent = msg.fromName + ': ' + msg.text + (msg.read ? ' ✔✔' : ' ✔');
        messagesDiv.appendChild(div);

        if(msg.to === currentUser.uid && !msg.read) {
          doc.ref.update({read:true});
        }
      });
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    });

  /* TYPING INDICATOR */
  db.collection('typing').doc(currentChatId).onSnapshot(doc => {
    if(doc.exists) {
      const typingUser = doc.data().user;
      typingDiv.textContent = typingUser !== currentUser.username ? typingUser + ' is typing...' : '';
    }
  });
}

/* SEND MESSAGE + TYPING */
document.getElementById('input').addEventListener('input', () => {
  if(!currentChatId) return;
  db.collection('typing').doc(currentChatId).set({user: currentUser.username});
  clearTimeout(typingTimeout);
  typingTimeout = setTimeout(() => db.collection('typing').doc(currentChatId).delete(), 1000);
});

document.getElementById('form').addEventListener('submit', async e => {
  e.preventDefault();
  const input = document.getElementById('input');
  if(!input.value || !currentChatId) return;

  const otherUserId = currentChatId.replace(currentUser.uid,'').replace('_','');

  await db.collection('messages').add({
    chatId: currentChatId,
    from: currentUser.uid,
    fromName: currentUser.username,
    to: otherUserId,
    text: input.value,
    timestamp: Date.now(),
    read: false
  });

  input.value = '';
  db.collection('typing').doc(currentChatId).delete();
});
</script>

</body>
</html>
